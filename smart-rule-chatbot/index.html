<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartBot AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Background decorative blobs -->
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        
        <main class="chat-container">
            <header class="chat-header">
                <div class="header-info">
                    <div class="avatar">
                        <span class="avatar-text">SB</span>
                    </div>
                    <div>
                        <h1>SmartBot</h1>
                        <span class="status">
                            <span class="status-dot"></span> Online
                        </span>
                    </div>
                </div>
            </header>
            
            <div class="chat-history" id="chat-history">
                <div class="message bot">
                    <div class="message-content">
                        Hello! I am SmartBot, your friendly assistant. How can I help you today?
                    </div>
                    <div class="timestamp">Just now</div>
                </div>
            </div>

            <div class="typing-indicator" id="typing-indicator" style="display: none;">
                <span></span><span></span><span></span>
            </div>
            
            <div class="input-area">
                <form id="chat-form">
                    <input type="text" id="user-input" placeholder="Type your message here..." autocomplete="off" required>
                    <button type="submit" id="send-btn" aria-label="Send Message">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="22" y1="2" x2="11" y2="13"></line>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                        </svg>
                    </button>
                </form>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
